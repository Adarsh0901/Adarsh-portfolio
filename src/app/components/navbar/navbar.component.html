<nav class="navbar" [class.scrolled]="isScrolled">

      <span class="logo-bracket">&lt;</span>
      <span class="logo-name">Adarsh Shukla</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="nav-links" [class.active]="isMobileMenuOpen">
      @for (link of navLinks; track link.label) {
        <li>
          <a [href]="link.href" (click)="closeMobileMenu()">{{ link.label }}</a>
        </li>
      }
      <li>
        <a href="#contact" class="nav-cta" (click)="closeMobileMenu()">Hire Me</a>
      </li>
    </ul>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
